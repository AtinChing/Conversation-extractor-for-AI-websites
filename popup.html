<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conversation Extractor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-copy">
          <h1>Conversation Extractor</h1>
          <p>Export ChatGPT, Claude, and Gemini chats</p>
        </div>
      </header>

      <section class="card" aria-labelledby="format-label">
        <div class="label-stack full">
          <label id="format-label" for="exportFormat">Export Format</label>
          <span class="hint">Used by the on-page Download Transcript button</span>
        </div>
        <select id="exportFormat" class="select"></select>
      </section>

      <footer class="footer">
        <p id="statusText">Open ChatGPT, Claude, or Gemini, then click Download Transcript.</p>
      </footer>
    </main>
    <script src="shared/namespace.js"></script>
    <script src="shared/download.js"></script>
    <script src="shared/format-registry.js"></script>
    <script src="shared/formats/markdown.js"></script>
    <script src="shared/formats/json.js"></script>
    <script src="shared/formats/txt.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
